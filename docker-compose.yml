services:
  database:
    image: mysql:latest
    container_name: database
    env_file:
      - database.env
    volumes:
      - ./database_setup.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyourpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend_network

  backend:
    build:
      context: ./trainee_backend
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - trainee_backend/.env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend_network

  frontend:
    build:
      context: ./trainee_frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: frontend
    networks:
      - frontend_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx_proxy
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
    networks:
      - frontend_network
      - backend_network

networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge

volumes:
  db_data:
